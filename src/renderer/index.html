<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUGUXIAOJIU - 异色保底计数</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #0f0f1e;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
            font-size: 14px;
        }

        .container {
            padding: 20px;
            max-width: 960px;
            margin: 0 auto;
        }

        h1 {
            color: #e94560;
            font-size: 20px;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .card:hover {
            border-color: rgba(233, 69, 96, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 13px;
            color: #e94560;
            margin-bottom: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .top-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
        }

        .sprite-search-container {
            flex: 1;
            position: relative;
        }

        .sprite-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 8px;
            background: rgba(233, 69, 96, 0.08);
            color: #ff69b4;
            font-size: 14px;
            font-weight: 500;
        }

        .sprite-input:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.15);
        }

        .sprite-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 300px;
            overflow-y: auto;
            background: linear-gradient(135deg, #2a2a4e, #1a1a2e);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 8px;
            margin-top: 4px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .sprite-dropdown.show {
            display: block;
        }

        .dropdown-family {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dropdown-family-title {
            font-size: 11px;
            color: #888;
            font-weight: 600;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .dropdown-item {
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            color: #e0e0e0;
            border-radius: 4px;
            transition: all 0.15s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dropdown-item:hover {
            background: rgba(233, 69, 96, 0.15);
            color: #ff69b4;
        }

        .dropdown-item.selected {
            background: rgba(233, 69, 96, 0.25);
            color: #ff69b4;
            font-weight: 600;
        }

        .dropdown-item-name {
            flex: 1;
        }

        .dropdown-item-attr {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.08);
            color: #aaa;
            margin-left: 8px;
        }

        .dropdown-item-stage {
            font-size: 10px;
            color: #666;
            margin-left: 8px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .counter-card {
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.12), rgba(78, 204, 163, 0.08));
            border: 1px solid rgba(233, 69, 96, 0.25);
            text-align: center;
            padding: 20px;
        }

        .counter-card:hover {
            border-color: rgba(233, 69, 96, 0.4);
        }

        .count-number {
            font-size: 64px;
            font-weight: 800;
            color: #ff69b4;
            text-shadow: 0 0 30px rgba(255, 105, 180, 0.6);
            line-height: 1;
        }

        .count-label {
            font-size: 12px;
            color: #888;
            margin-top: 6px;
        }

        .pity-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            margin-top: 14px;
            overflow: hidden;
        }

        .pity-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
            background: linear-gradient(90deg, #4ecca3, #e94560);
        }

        .pity-text {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #666;
            margin-top: 6px;
            font-weight: 600;
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
        }

        button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560, #c73e54);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5);
        }

        .btn-success {
            background: linear-gradient(135deg, #4ecca3, #3db892);
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(78, 204, 163, 0.5);
        }

        .btn-danger {
            background: linear-gradient(135deg, #e94560, #c73e54);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #f0a500, #d49200);
            color: white;
        }

        .btn-info {
            background: linear-gradient(135deg, #4dabf7, #339af0);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .btn-lg {
            padding: 14px 24px;
            font-size: 15px;
            font-weight: 700;
        }

        .btn-full {
            width: 100%;
        }

        .region-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }

        .region-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.25s;
        }

        .region-item:hover {
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .region-item button {
            width: 100%;
            font-size: 12px;
            padding: 9px 12px;
        }

        .region-status {
            font-size: 11px;
            color: #666;
            text-align: center;
            font-family: monospace;
            padding: 4px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        .region-status.active {
            color: #4ecca3;
            background: rgba(78, 204, 163, 0.1);
            font-weight: bold;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 8px;
            font-size: 13px;
        }

        .status-label {
            color: #888;
        }

        .status-value {
            font-family: monospace;
            font-weight: 700;
            font-size: 14px;
        }

        .val-green {
            color: #4ecca3;
        }

        .val-pink {
            color: #ff69b4;
        }

        .val-yellow {
            color: #f0a500;
        }

        .val-red {
            color: #e94560;
        }

        .val-gray {
            color: #555;
        }

        .control-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .log-panel {
            max-height: 120px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.35);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            margin-top: 10px;
            line-height: 1.7;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .log-panel::-webkit-scrollbar {
            width: 6px;
        }

        .log-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        .log-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        .history-list {
            max-height: 120px;
            overflow-y: auto;
            font-size: 11px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 7px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: background 0.2s;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .history-item:nth-child(even) {
            background: rgba(0, 0, 0, 0.15);
        }

        .history-num {
            color: #ff69b4;
            font-weight: 700;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            background: linear-gradient(135deg, #2a2a4e, #1a1a2e);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            max-width: 420px;
            border: 2px solid #e94560;
            box-shadow: 0 0 60px rgba(233, 69, 96, 0.4);
        }

        .modal-title {
            font-size: 22px;
            color: #ff69b4;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .modal-msg {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 24px;
            line-height: 1.7;
        }

        .modal-buttons {
            display: flex;
            gap: 14px;
            justify-content: center;
        }

        .modal-buttons button {
            padding: 14px 28px;
            font-size: 15px;
            border-radius: 10px;
        }

        select {
            padding: 9px 12px;
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 8px;
            background: linear-gradient(135deg, #2a2a4e, #1a1a2e);
            color: #ff69b4;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.15);
        }

        select option {
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>✦ YUGUXIAOJIU - 异色保底计数 ✦</h1>

        <!-- 顶部精灵名输入 -->
        <div class="top-bar">
            <label style="color:#888;font-size:13px;font-weight:600;">当前精灵</label>
            <div class="sprite-search-container" id="spriteSearchContainer">
                <input type="text" id="spriteName" class="sprite-input" value="空空颅" placeholder="输入或选择精灵名称..."
                    autocomplete="off">
                <div class="sprite-dropdown" id="spriteDropdown"></div>
            </div>
        </div>

        <!-- 第一行：计数器 + 操作按钮 -->
        <div class="main-grid">
            <div class="card counter-card">
                <div class="count-number" id="pollutedCount">0</div>
                <div class="count-label">污染精灵计数 / 80只保底异色</div>
                <div class="pity-bar">
                    <div class="pity-fill" id="pityFill" style="width:0%"></div>
                </div>
                <div class="pity-text">
                    <span id="pityProgress">0/80</span>
                    <span id="pityRate">保底概率: 0%</span>
                </div>
            </div>

            <div class="card">
                <div class="card-title">⚡ 操作面板</div>
                <div class="action-grid">
                    <button class="btn-danger btn-lg btn-full" id="confirmBtn" onclick="confirmPollution()"
                        style="grid-column: 1 / -1;">确认污染 (+1)</button>
                    <label class="checkbox-label" style="grid-column: 1 / -1;display:flex;align-items:center;gap:8px;padding:8px;">
                        <input type="checkbox" id="autoCountToggle" onchange="toggleAutoCount()" />
                        <span>🔄 自动计数（污染后退出战斗自动+1）</span>
                    </label>
                    <button class="btn-secondary btn-full" onclick="undoLast()">↩ 撤销</button>
                    <button class="btn-secondary btn-full" onclick="resetCount()">🔄 重置</button>
                </div>

                <div class="card-title" style="margin-top:16px;">📜 历史记录</div>
                <div class="history-list" id="historyList">
                    <div style="color:#555;text-align:center;padding:20px;font-size:12px;">暂无记录</div>
                </div>
            </div>
        </div>

        <!-- 区域设置卡片 -->
        <div class="card">
            <div class="card-title">🎯 区域设置</div>
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center;">
                <select id="windowSelect" style="min-width:150px;flex:1;min-width:150px;max-width:250px;">
                    <option value="">-- 选择游戏窗口 --</option>
                </select>
                <div style="display:flex;flex-wrap:wrap;gap:6px;">
                    <button class="btn-secondary" style="white-space:nowrap;" onclick="refreshWindowList()">🔄 刷新</button>
                    <button class="btn-success" style="white-space:nowrap;" onclick="autoSetPeaceRegions()">🌿 非战</button>
                    <button class="btn-danger" style="white-space:nowrap;" onclick="autoSetBattleRegions()">⚔️ 战斗</button>
                    <button class="btn-primary" style="white-space:nowrap;" onclick="editRegions()">✏️ 编辑</button>
                    <button class="btn-warning" style="white-space:nowrap;" onclick="openTemplateDir()">📁 目录</button>
                    <button class="btn-info" style="white-space:nowrap;" onclick="exportRegionData()">📊 输出</button>
                </div>
            </div>

            <div
                style="font-size:11px;color:#666;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">
                ⚔️ 战斗检测区域</div>
            <div class="region-grid">
                <div class="region-item">
                    <button class="btn-primary" onclick="selectRegion('battle1')">战斗按钮 ①</button>
                    <div class="region-status" id="battle1Info">未选择</div>
                </div>
                <div class="region-item">
                    <button class="btn-primary" onclick="selectRegion('battle2')">战斗按钮 ②</button>
                    <div class="region-status" id="battle2Info">未选择</div>
                </div>
            </div>

            <div
                style="font-size:11px;color:#666;font-weight:600;margin-top:14px;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">
                🌿 非战检测区域</div>
            <div class="region-grid">
                <div class="region-item">
                    <button class="btn-success" onclick="selectRegion('peace1')">非战区域 ①</button>
                    <div class="region-status" id="peace1Info">未选择</div>
                </div>
                <div class="region-item">
                    <button class="btn-success" onclick="selectRegion('peace2')">非战区域 ②</button>
                    <div class="region-status" id="peace2Info">未选择</div>
                </div>
            </div>

            <div
                style="font-size:11px;color:#666;font-weight:600;margin-top:14px;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">
                🩸 血条识别区域</div>
            <div class="region-grid">
                <div class="region-item" style="grid-column: 1 / -1;">
                    <button class="btn-warning" onclick="selectRegion('avatar')">🩸 血条区域 (污染/正常检测)</button>
                    <div class="region-status" id="avatarInfo">未选择</div>
                </div>
            </div>
        </div>

        <!-- 状态 & 控制卡片 -->
        <div class="card">
            <div class="card-title">📊 实时状态 & 控制</div>
            <div class="status-grid">
                <div class="status-item">
                    <span class="status-label">战斗状态</span>
                    <span class="status-value val-gray" id="val_battle">未检测</span>
                </div>
                <div class="status-item">
                    <span class="status-label">精灵类型</span>
                    <span class="status-value val-gray" id="val_type">-</span>
                </div>
                <div class="status-item">
                    <span class="status-label">颜色(RGB)</span>
                    <span class="status-value val-gray" id="val_color">-</span>
                </div>
                <div class="status-item">
                    <span class="status-label">粉紫比</span>
                    <span class="status-value val-gray" id="val_pink">-</span>
                </div>
            </div>

            <div class="control-row">
                <button class="btn-success" id="startBtn" onclick="toggleDetection()">▶ 开始监控</button>
                <button class="btn-secondary" onclick="detectOnce()">🔍 单次检测</button>
                <select id="intervalSelect" style="width:90px;">
                    <option value="1000" selected>1s</option>
                    <option value="1500">1.5s</option>
                    <option value="2000">2s</option>
                    <option value="3000">3s</option>
                    <option value="5000">5s</option>
                </select>
            </div>

            <div class="log-panel" id="logPanel"></div>
        </div>
    </div>

    <div class="modal-overlay" id="exitModal">
        <div class="modal-box">
            <div class="modal-title" id="modalTitle">⚠️ 提示</div>
            <div class="modal-msg" id="exitModalMsg"></div>
            <div class="modal-buttons">
                <button class="btn-danger btn-lg" id="modalYes">是，计数 (+1)</button>
                <button class="btn-secondary btn-lg" id="modalNo">否，跳过</button>
            </div>
        </div>
    </div>

    <script>
        let selectedWindow = null;
        let regions = { battle1: null, battle2: null, peace1: null, peace2: null, avatar: null };
        let regionTemplates = { battle1: null, battle2: null, peace1: null, peace2: null };
        let isDetecting = false;
        let detectionInterval = null;
        let templates = [];
        let recognizerWorker = null;
        let isWorkerReady = false;

        let pollutedCount = 0;
        let history = [];
        let currentInBattle = false;
        let currentIsPolluted = false;
        let pendingPollution = false;
        let lastBattleState = null;
        let cooldownActive = false;
        let modalShowing = false;
        let battleResultReceived = false;
        let cooldownUntil = 0;
        let autoCountEnabled = false;
        let detectedPollutedInBattle = false;
        let regionStatusInterval = null;
        let lastRegionUpdateTime = 0;

        const PITY_MAX = 80;
        const BASE_RATE = 0.018;
        const COMPENSATED_RATE = 0.02;

        let logBuffer = [];
        let logFlushTimer = null;
        let lastLogMsg = '';
        let lastLogCount = 0;

        function addLog(msg) {
            if (msg === lastLogMsg) {
                lastLogCount++;
                if (lastLogCount > 1) {
                    return;
                }
            } else {
                if (lastLogCount > 1) {
                    const t = new Date().toLocaleTimeString();
                    logBuffer.push('[' + t + '] ... (重复 ' + lastLogCount + ' 次)');
                }
                lastLogMsg = msg;
                lastLogCount = 1;
            }
            
            const t = new Date().toLocaleTimeString();
            logBuffer.push('[' + t + '] ' + msg);

            if (!logFlushTimer) {
                logFlushTimer = requestAnimationFrame(() => {
                    const panel = document.getElementById('logPanel');
                    if (!panel) return;

                    const fragment = document.createDocumentFragment();
                    logBuffer.forEach(m => {
                        const div = document.createElement('div');
                        div.textContent = m;
                        fragment.appendChild(div);
                    });
                    panel.appendChild(fragment);

                    while (panel.children.length > 40) panel.removeChild(panel.firstChild);
                    panel.scrollTop = panel.scrollHeight;

                    logBuffer = [];
                    logFlushTimer = null;
                });
            }
        }

        function setVal(id, val, cls) {
            const el = document.getElementById('val_' + id);
            if (!el) return;
            el.textContent = String(val);
            el.className = 'status-value ' + (cls || 'gray');
        }

        function updateCounter() {
            document.getElementById('pollutedCount').textContent = pollutedCount;
            document.getElementById('pityProgress').textContent = pollutedCount + '/' + PITY_MAX;
            const pct = Math.min(100, (pollutedCount / PITY_MAX) * 100);
            document.getElementById('pityFill').style.width = pct + '%';

            let rate = 0;
            if (pollutedCount > 0) {
                const pityIncrease = Math.min(0.98, pollutedCount / PITY_MAX * 0.97);
                rate = BASE_RATE + (COMPENSATED_RATE - BASE_RATE) * pityIncrease + (1 - COMPENSATED_RATE) * Math.pow(pollutedCount / PITY_MAX, 2);
                rate = Math.min(rate, 0.995);
            }
            if (pollutedCount >= PITY_MAX) rate = 1;
            document.getElementById('pityRate').textContent = '保底概率: ' + (rate * 100).toFixed(2) + '%';

            saveData();
        }

        function confirmPollution() {
            const name = document.getElementById('spriteName').value.trim() || '未知';
            pollutedCount++;
            pendingPollution = false;
            const entry = { num: pollutedCount, time: new Date().toLocaleString(), type: 'confirmed', name: name };
            history.unshift(entry);
            if (history.length > 50) history.pop();
            updateCounter();
            renderHistory();

        async function detectOnce() {
            if (!selectedWindow) { alert('请先选择游戏窗口'); return; }
            if (!checkRegionsReady()) { alert('请先完成所有区域框选\n需要: 战斗按钮×2 + 非战区域×2 + 血条'); return; }

            await updateWindowPosition();
            
            if (modalShowing) return;

            const now = Date.now();
            if (cooldownUntil > now) {
                const remaining = Math.ceil((cooldownUntil - now) / 1000);
                if (remaining > 0) {
                    setVal('battle', '冷却 ' + remaining + 's', 'yellow');
                    return;
                } else {
                    cooldownUntil = 0;
                    battleResultReceived = false;
                    currentInBattle = false;
                    pendingPollution = false;
                    lastBattleState = null;
                    setVal('type', '-', 'gray');
                    setVal('color', '-', 'gray');
                    setVal('pink', '-', 'gray');
                    addLog('✅ 冷却结束，恢复检测');
                }
            }

            if (battleResultReceived && currentInBattle) {
                try {
                    const capturePromises = {};
                    for (const key of ['peace1', 'peace2', 'battle1', 'battle2']) {
                        if (regions[key]) {
                            const region = regions[key];
                            const captureRegion = {
                                x: region.screenX !== undefined ? region.screenX : 
                                   (selectedWindow ? selectedWindow.x + region.x : region.x),
                                y: region.screenY !== undefined ? region.screenY : 
                                   (selectedWindow ? selectedWindow.y + region.y : region.y),
                                width: region.width,
                                height: region.height
                            };
                            capturePromises[key] = window.electronAPI.captureRegion(captureRegion);
                        }
                    }

                    const captures = await Promise.all(Object.entries(capturePromises).map(async ([key, promise]) => {
                        try {
                            const cap = await promise;
                            if (!cap) return { key, result: false };

                            if (regionTemplates[key] && recognizerWorker && isWorkerReady) {
                                const matchResult = await matchSingleRegion(cap.image, regionTemplates[key], key);
                                return { key, result: matchResult };
                            } else {
                                const contentResult = await hasContent(cap.image);
                                return { key, result: contentResult };
                            }
                        } catch (e) {
                            return { key, result: false };
                        }
                    }));

                    const results = {};
                    captures.forEach(({ key, result }) => {
                        results[key] = result;
                    });

                    const p1 = typeof results.peace1 === 'object' ? results.peace1.matched : results.peace1;
                    const p2 = typeof results.peace2 === 'object' ? results.peace2.matched : results.peace2;
                    const b1 = typeof results.battle1 === 'object' ? results.battle1.matched : results.battle1;
                    const b2 = typeof results.battle2 === 'object' ? results.battle2.matched : results.battle2;

                    const peaceDetected = (p1 || p2);
                    const battleDetected = (b1 || b2);

                    const exitedBattle = p1 && p2;

                    if (exitedBattle) {
                        handleBattleTransition(false);
                        setVal('battle', '非战斗', 'green');
                        battleResultReceived = false;
                        cooldownUntil = 0;
                        setVal('type', '-', 'gray');
                        setVal('color', '-', 'gray');
                        setVal('pink', '-', 'gray');
                        addLog('✅ 已退出战斗，恢复检测');
                    } else {
                        setVal('battle', '等待退出...', 'yellow');
                    }
                } catch (e) { /* silent */ }
                return;
            }

            try {
                const capturePromises = {};

                for (const key of ['battle1', 'battle2', 'peace1', 'peace2']) {
                    if (regions[key]) {
                        const region = regions[key];
                        const captureRegion = {
                            x: region.screenX !== undefined ? region.screenX : 
                               (selectedWindow ? selectedWindow.x + region.x : region.x),
                            y: region.screenY !== undefined ? region.screenY : 
                               (selectedWindow ? selectedWindow.y + region.y : region.y),
                            width: region.width,
                            height: region.height
                        };
                        capturePromises[key] = window.electronAPI.captureRegion(captureRegion);
                    }
                }

                const captures = await Promise.all(Object.entries(capturePromises).map(async ([key, promise]) => {
                    try {
                        const cap = await promise;
                        if (!cap) return { key, result: false };

                        if (regionTemplates[key] && recognizerWorker && isWorkerReady) {
                            const matchResult = await matchSingleRegion(cap.image, regionTemplates[key], key);
                            return { key, result: matchResult };
                        } else {
                            const contentResult = await hasContent(cap.image);
                            return { key, result: contentResult };
                        }
                    } catch (e) {
                        return { key, result: false };
                    }
                }));

                const results = {};
                captures.forEach(({ key, result }) => {
                    results[key] = result;
                });

                let hpCap = null;
                if (regions.avatar) {
                    try {
                        const region = regions.avatar;
                        const captureRegion = {
                            x: region.screenX !== undefined ? region.screenX : 
                               (selectedWindow ? selectedWindow.x + region.x : region.x),
                            y: region.screenY !== undefined ? region.screenY : 
                               (selectedWindow ? selectedWindow.y + region.y : region.y),
                            width: region.width,
                            height: region.height
                        };
                        hpCap = await window.electronAPI.captureRegion(captureRegion);
                    } catch (e) { /* silent */ }
                }

                const b1 = typeof results.battle1 === 'object' ? results.battle1.matched : results.battle1;
                const b2 = typeof results.battle2 === 'object' ? results.battle2.matched : results.battle2;
                const p1 = typeof results.peace1 === 'object' ? results.peace1.matched : results.peace1;
                const p2 = typeof results.peace2 === 'object' ? results.peace2.matched : results.peace2;

                const battleDetected = (b1 || b2);
                const peaceDetected = (p1 || p2);

                // 进入战斗：识别到战斗按钮即可
                // 非战斗：战斗按钮消失 或 检测到非战区域（退出/地图等）
                const inBattle = battleDetected && !peaceDetected;

                setVal('battle', inBattle ? '战斗中' : '非战斗', inBattle ? 'red' : 'green');

                if (typeof results.battle1 === 'object') updateRegionStatus('battle1', results.battle1);
                if (typeof results.battle2 === 'object') updateRegionStatus('battle2', results.battle2);
                if (typeof results.peace1 === 'object') updateRegionStatus('peace1', results.peace1);
                if (typeof results.peace2 === 'object') updateRegionStatus('peace2', results.peace2);

                handleBattleTransition(inBattle);

                if (inBattle && hpCap) {
                    const hpResult = await analyzeHPColor(hpCap.image);
                    handleHPResult(hpResult);
                } else if (inBattle) {
                    setVal('type', '-', 'gray');
                    setVal('color', '-', 'gray');
                    setVal('pink', '-', 'gray');
                } else {
                    setVal('type', '-', 'gray');
                    setVal('color', '-', 'gray');
                    setVal('pink', '-', 'gray');
                }

            } catch (e) { addLog('检测失败: ' + e.message); }
        }

        function matchSingleRegion(screenshotBase64, templateBase64, regionKey) {
            return new Promise(function (resolve) {
                const timeout = setTimeout(function () {
                    resolve({ matched: false, similarity: 0, method: 'timeout' });
                }, 3000);

                const handler = function (e) {
                    if (e.data.type === 'matchResult' && e.data.regionKey === regionKey) {
                        clearTimeout(timeout);
                        recognizerWorker.removeEventListener('message', handler);
                        resolve(e.data.result);
                    }
                };
                recognizerWorker.addEventListener('message', handler);

                recognizerWorker.postMessage({
                    type: 'matchRegion',
                    data: { screenshot: screenshotBase64, template: templateBase64, regionKey: regionKey }
                });
            });
        }

        function updateRegionStatus(key, result) {
            const el = document.getElementById(key + 'Info');
            if (!el) return;
            const pct = (result.similarity * 100).toFixed(0);
            if (result.matched) {
                el.textContent = regions[key].width + 'x' + regions[key].height + ' ✓' + pct + '%';
                el.classList.add('active');

                el.textContent = regions[key].width + 'x' + regions[key].height + ' ✗' + pct + '%';

            }
        }

        function hasContent(imageBase64) {
            return new Promise(function (resolve) {
                const img = new Image();
                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    const data = ctx.getImageData(0, 0, img.width, img.height).data;
                    let sum = 0, count = 0;
                    for (let i = 0; i < data.length; i += 16) {
                        sum += data[i] + data[i + 1] + data[i + 2];
                        count++;
                    }
                    resolve((sum / (count * 3)) > 30);
                };
                img.onerror = function () { resolve(false); };
                img.src = imageBase64;
            });
        }

        function handleResult(result) { }

        function analyzeHPColor(imageBase64) {
            return new Promise(function (resolve) {
                const img = new Image();
                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    const scale = Math.max(1, Math.floor(Math.max(img.width, img.height) / 80));
                    canvas.width = Math.floor(img.width / scale);
                    canvas.height = Math.floor(img.height / scale);
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                    let totalR = 0, totalG = 0, totalB = 0;
                    let greenPixelCount = 0;
                    let pinkPixelCount = 0;
                    let validCount = 0;

                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i], g = data[i + 1], b = data[i + 2];
                        const brightness = (r + g + b) / 3;

                        if (brightness < 25) continue;

                        totalR += r; totalG += g; totalB += b;
                        validCount++;

                        const maxC = Math.max(r, g, b), minC = Math.min(r, g, b);
                        const sat = maxC === 0 ? 0 : (maxC - minC) / maxC;

                        if (sat < 0.15) continue;

                        if (g > r * 1.15 && g > b * 1.1 && g - r > 20 && g - b > 15) greenPixelCount++;

                        if (r > g * 1.08 && r > b * 1.05 && r - g > 15) {
                            if (r > 140 || (r - b > 20)) pinkPixelCount++;
                        }
                    }

                    const avgR = validCount > 0 ? totalR / validCount : 0;
                    const avgG = validCount > 0 ? totalG / validCount : 0;
                    const avgB = validCount > 0 ? totalB / validCount : 0;
                    const greenRatio = validCount > 0 ? greenPixelCount / validCount : 0;
                    const pinkRatio = validCount > 0 ? pinkPixelCount / validCount : 0;

                    let hpType = 'unknown';
                    if (greenRatio > 0.20) hpType = 'green';
                    else if (pinkRatio > 0.12) hpType = 'pink';
                    else if (avgR > avgG && avgR > avgB && avgR > 100) hpType = 'pink';
                    else if (avgG > avgR && avgG > avgB) hpType = 'green';

                    resolve({
                        type: hpType,
                        isPolluted: hpType === 'pink',
                        avgColor: { r: Math.round(avgR), g: Math.round(avgG), b: Math.round(avgB) },
                        greenRatio: greenRatio,
                        pinkRatio: pinkRatio,
                        brightness: 0
                    });
                };
                img.onerror = function () { resolve({ type: 'error', isPolluted: false, avgColor: { r: 0, g: 0, b: 0 }, greenRatio: 0, pinkRatio: 0 }); };
                img.src = imageBase64;
            });
        }

        function handleHPResult(result) {
            if (result.type === 'error') {
                addLog('血条分析失败');
                setVal('type', '错误', 'red');
                setVal('color', '-', 'gray');
                setVal('pink', '-', 'gray');
                return;
            }

            battleResultReceived = true;
            currentIsPolluted = result.isPolluted;
            const colorStr = '(' + result.avgColor.r + ',' + result.avgColor.g + ',' + result.avgColor.b + ')';
            const pinkPct = (result.pinkRatio * 100).toFixed(1);
            const greenPct = (result.greenRatio * 100).toFixed(1);

            setVal('color', colorStr, 'gray');
            setVal('pink', `粉:${pinkPct}% 绿:${greenPct}%`, 'gray');

            if (result.pinkRatio > 0.75) {
                setVal('type', '🩷 污染!', 'pink');
                setVal('pink', `粉:${pinkPct}% ✅`, 'pink');

                pendingPollution = true;
                detectedPollutedInBattle = true;
                addLog(`🩷 血条非绿色 → 污染! RGB${colorStr} 粉:${pinkPct}% > 75% ${autoCountEnabled ? '(自动计数)' : '(弹窗确认)'}`);

                if (!autoCountEnabled) {
                    showPollutionModal();
                }
            } else if (result.greenRatio > 0.20) {
                setVal('type', '🔵 正常', 'green');
                setVal('pink', `绿:${greenPct}% ✓`, 'green');

                pendingPollution = false;
                addLog(`🔵 血条为绿色 → 正常 RGB${colorStr} 粉:${pinkPct}% 绿:${greenPct}%`);
            } else {
                setVal('type', '?', 'yellow');
                setVal('pink', `粉:${pinkPct}% 绿:${greenPct}% ⚠`, 'yellow');
                addLog(`⚠️ 无法确定: RGB${colorStr} 粉:${pinkPct}% 绿:${greenPct}%`);

                pendingPollution = false;
            }
        }

        function handleBattleTransition(newInBattle) {
            if (!lastBattleState && newInBattle) {
                battleResultReceived = false;
                detectedPollutedInBattle = false;
            }
            
            if (autoCountEnabled && lastBattleState && !newInBattle && detectedPollutedInBattle && !cooldownActive) {
                confirmPollution();
                detectedPollutedInBattle = false;
                addLog('🔄 自动计数: 污染精灵已自动计入');

        let searchTimeout = null;

        function initSpriteSearch() {
            try {
                if (!pokemonData || !pokemonData.families) {
                    addLog('❌ 精灵数据未定义');
                    return;
                }

                const spriteInput = document.getElementById('spriteName');
                const dropdown = document.getElementById('spriteDropdown');
                const container = document.getElementById('spriteSearchContainer');

                spriteInput.addEventListener('focus', function () {
                    showDropdown('');
                });

                spriteInput.addEventListener('input', function () {
                    clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(function () {
                        showDropdown(this.value);
                    }.bind(this), 150);
                });

                spriteInput.addEventListener('blur', function () {
                    setTimeout(function () {
                        hideDropdown();
                    }, 200);
                });

                container.addEventListener('click', function (e) {
                    e.stopPropagation();
                });

                document.addEventListener('click', function () {
                    hideDropdown();
                });

                let totalCount = 0;
                pokemonData.families.forEach(f => totalCount += f.members.length);
                addLog('✅ 精灵图鉴已加载 (' + totalCount + '只精灵, ' + pokemonData.families.length + '个家族)');
            } catch (e) {
                addLog('❌ 精灵图鉴初始化失败: ' + e.message);
                console.error('Pokemon init error:', e);
            }
        }

        function showDropdown(keyword) {
            if (!pokemonData || !pokemonData.families) return;

            const dropdown = document.getElementById('spriteDropdown');
            const results = searchPokemon(keyword);

            if (results.length === 0) {
                dropdown.innerHTML = '<div class="dropdown-family"><div style="padding:12px;text-align:center;color:#666;">未找到匹配的精灵</div></div>';
                dropdown.classList.add('show');
                return;
            }

            let html = '';
            results.forEach(function (family) {
                html += '<div class="dropdown-family">';
                html += '<div class="dropdown-family-title">' + family.familyName + '</div>';
                family.members.forEach(function (member) {
                    const isSelected = document.getElementById('spriteName').value === member.name;
                    html += '<div class="dropdown-item' + (isSelected ? ' selected' : '') + '" data-name="' + member.name + '" onclick="selectSprite(\'' + member.name + '\')">';
                    html += '<span class="dropdown-item-name">' + member.name + '</span>';
                    html += '<span class="dropdown-item-id">#' + member.id + '</span>';
                    html += '</div>';
                });
                html += '</div>';
            });

            dropdown.innerHTML = html;
            dropdown.classList.add('show');
        }

        function hideDropdown() {
            const dropdown = document.getElementById('spriteDropdown');
            dropdown.classList.remove('show');
        }

        function searchPokemon(keyword) {
            if (!keyword || !keyword.trim()) {
                return pokemonData.families;
            }

            keyword = keyword.toLowerCase().trim();
            return pokemonData.families.filter(function (family) {
                return family.members.some(function (member) {
                    return member.name.toLowerCase().includes(keyword);
                });
            }).map(function (family) {
                return {
                    familyId: family.familyId,
                    familyName: family.familyName,
                    members: family.members.filter(function (member) {
                        return member.name.toLowerCase().includes(keyword);
                    })
                };
            }).filter(f => f.members.length > 0).slice(0, 10);
        }

        function selectSprite(name) {
            const input = document.getElementById('spriteName');
            input.value = name;
            saveData();
            hideDropdown();
            addLog('已选择精灵: ' + name);
        }

        addLog('页面已加载');
        refreshWindowList();
        initWorker();
        loadData();
        initSpriteSearch();

        (async function loadTemplates() {
            try {
                const list = await window.electronAPI.getTemplateList();
                templates = list.map(t => {
                    var ext = t.filename.split('.').pop().toLowerCase();
                    return { name: t.name, data: 'data:image/' + (ext === 'jpg' ? 'jpeg' : ext) + ';base64,' + t.data };
                });
                if (recognizerWorker && templates.length > 0) {
                    recognizerWorker.postMessage({ type: 'setTemplates', data: templates });
                }
                addLog('已加载 ' + templates.length + ' 个模板');
            } catch (e) { addLog('模板加载失败: ' + e.message); }
        })();
